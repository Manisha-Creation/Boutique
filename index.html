<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manisha's Creation | Boutique Bareilly</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --crimson: #9B1B30;
            --crimson-dark: #6d1321;
            --crimson-light: #c94060;
            --gold: #C6963A;
            --gold-light: #e8c06e;
            --cream: #FDF8F2;
            --warm-white: #FEFCF9;
            --charcoal: #1a1410;
            --muted: #8a7d74;
            --border: rgba(155,27,48,0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--warm-white);
            color: var(--charcoal);
            overflow-x: hidden;
        }

        h1, h2, h3, h4, .serif { font-family: 'Cormorant Garamond', serif; }

        /* ─── ANIMATIONS ─── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        @keyframes shimmer {
            0%   { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        @keyframes floatUp {
            0%, 100% { transform: translateY(0px); }
            50%       { transform: translateY(-8px); }
        }
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.94); }
            to   { opacity: 1; transform: scale(1); }
        }
        @keyframes slideLeft {
            from { opacity: 0; transform: translateX(-50px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideRight {
            from { opacity: 0; transform: translateX(50px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes pulse-gold {
            0%, 100% { box-shadow: 0 0 0 0 rgba(198,150,58,0.4); }
            50%       { box-shadow: 0 0 0 12px rgba(198,150,58,0); }
        }
        @keyframes marquee {
            from { transform: translateX(0); }
            to   { transform: translateX(-50%); }
        }
        @keyframes borderDraw {
            from { clip-path: inset(0 100% 0 0); }
            to   { clip-path: inset(0 0% 0 0); }
        }

        .animate-fade-up   { animation: fadeUp 0.9s ease both; }
        .animate-fade-in   { animation: fadeIn 0.9s ease both; }
        .animate-scale-in  { animation: scaleIn 0.8s ease both; }
        .animate-slide-l   { animation: slideLeft 0.9s ease both; }
        .animate-slide-r   { animation: slideRight 0.9s ease both; }

        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.25s; }
        .delay-3 { animation-delay: 0.4s; }
        .delay-4 { animation-delay: 0.55s; }
        .delay-5 { animation-delay: 0.7s; }

        /* ─── NAVBAR ─── */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 100;
            padding: 0 48px;
            height: 80px;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(253,248,242,0.92);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            transition: all 0.4s ease;
        }
        nav.scrolled {
            height: 64px;
            background: rgba(253,248,242,0.98);
            box-shadow: 0 4px 40px rgba(155,27,48,0.08);
        }

        .nav-logo {
            display: flex; flex-direction: column; line-height: 1;
            text-decoration: none;
        }
        .nav-logo .brand { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 700; color: var(--crimson); letter-spacing: -0.5px; }
        .nav-logo .sub   { font-family: 'DM Sans', sans-serif; font-size: 9px; letter-spacing: 6px; text-transform: uppercase; color: var(--gold); font-weight: 500; margin-top: 2px; }

        .nav-links { display: flex; align-items: center; gap: 40px; list-style: none; }
        .nav-links a {
            text-decoration: none;
            font-size: 11px; font-weight: 500; letter-spacing: 2.5px; text-transform: uppercase;
            color: var(--muted);
            position: relative;
            transition: color 0.3s;
        }
        .nav-links a::after {
            content: '';
            position: absolute; bottom: -4px; left: 0; right: 0;
            height: 1px; background: var(--crimson);
            transform: scaleX(0); transform-origin: left;
            transition: transform 0.3s ease;
        }
        .nav-links a:hover { color: var(--crimson); }
        .nav-links a:hover::after { transform: scaleX(1); }

        .nav-cta {
            background: var(--crimson);
            color: #fff !important;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 10px !important;
            letter-spacing: 2px !important;
            font-weight: 600 !important;
            text-decoration: none;
            transition: all 0.3s ease;
            text-transform: uppercase;
            border: 1.5px solid var(--crimson);
            position: relative; overflow: hidden;
        }
        .nav-cta::before {
            content: '';
            position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: left 0.5s;
        }
        .nav-cta:hover { background: var(--crimson-dark); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(155,27,48,0.3); }
        .nav-cta:hover::before { left: 100%; }

        .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 8px; }
        .hamburger span { width: 24px; height: 1.5px; background: var(--crimson); display: block; transition: all 0.3s; }

        /* ─── HERO ─── */
        #hero {
            min-height: 100vh;
            background: var(--cream);
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: center;
            position: relative;
            overflow: hidden;
            padding-top: 80px;
        }

        .hero-bg-pattern {
            position: absolute; inset: 0; pointer-events: none;
            background-image:
                repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(155,27,48,0.025) 40px, rgba(155,27,48,0.025) 41px),
                repeating-linear-gradient(-45deg, transparent, transparent 40px, rgba(198,150,58,0.02) 40px, rgba(198,150,58,0.02) 41px);
        }

        .hero-deco-circle {
            position: absolute;
            width: 600px; height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(155,27,48,0.06) 0%, transparent 70%);
            top: -100px; right: -100px;
            pointer-events: none;
        }

        .hero-content {
            padding: 80px 64px 80px 80px;
            position: relative; z-index: 2;
        }

        .hero-eyebrow {
            display: inline-flex; align-items: center; gap: 12px;
            font-size: 10px; letter-spacing: 4px; text-transform: uppercase; font-weight: 500;
            color: var(--gold);
            margin-bottom: 28px;
        }
        .hero-eyebrow::before {
            content: '';
            width: 32px; height: 1px; background: var(--gold);
        }

        .hero-h1 {
            font-size: clamp(52px, 5vw, 78px);
            font-weight: 300;
            line-height: 1.08;
            color: var(--charcoal);
            margin-bottom: 28px;
        }
        .hero-h1 em {
            font-style: italic;
            color: var(--crimson);
            font-weight: 400;
        }

        .hero-desc {
            font-size: 15px; font-weight: 300; color: var(--muted); line-height: 1.8;
            max-width: 400px;
            margin-bottom: 48px;
        }

        .hero-actions { display: flex; gap: 16px; flex-wrap: wrap; }

        .btn-primary {
            background: var(--crimson);
            color: #fff;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 10px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase;
            text-decoration: none;
            transition: all 0.3s;
            position: relative; overflow: hidden;
            border: 1.5px solid var(--crimson);
        }
        .btn-primary:hover { background: var(--crimson-dark); box-shadow: 0 12px 32px rgba(155,27,48,0.3); transform: translateY(-2px); }

        .btn-outline {
            background: transparent;
            color: var(--crimson);
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 10px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase;
            text-decoration: none;
            transition: all 0.3s;
            border: 1.5px solid var(--crimson);
        }
        .btn-outline:hover { background: var(--crimson); color: #fff; transform: translateY(-2px); }

        .hero-stats {
            display: flex; gap: 40px; margin-top: 64px; padding-top: 40px;
            border-top: 1px solid var(--border);
        }
        .hero-stat { }
        .hero-stat .num {
            font-family: 'Cormorant Garamond', serif;
            font-size: 40px; font-weight: 700; color: var(--crimson); line-height: 1;
        }
        .hero-stat .label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-top: 6px; font-weight: 500; }

        .hero-image-col {
            position: relative; height: 100vh; min-height: 700px;
            display: flex; align-items: stretch;
        }

        .hero-img-main {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: brightness(0.92) saturate(1.1);
        }

        .hero-img-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to right, var(--cream) 0%, transparent 30%);
        }

        .hero-badge {
            position: absolute; bottom: 60px; left: -32px;
            background: #fff;
            padding: 24px 28px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
            border: 1px solid var(--border);
            animation: floatUp 4s ease-in-out infinite;
        }
        .hero-badge .badge-title { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
        .hero-badge .badge-val { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 700; color: var(--crimson); margin-top: 4px; }

        .hero-tag {
            position: absolute; top: 48px; right: 32px;
            background: var(--crimson);
            color: #fff;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 9px; letter-spacing: 3px; text-transform: uppercase; font-weight: 600;
        }

        /* ─── MARQUEE ─── */
        .marquee-section {
            background: var(--crimson);
            padding: 18px 0;
            overflow: hidden;
        }
        .marquee-track {
            display: flex; white-space: nowrap;
            animation: marquee 22s linear infinite;
        }
        .marquee-item {
            padding: 0 40px;
            font-size: 11px; letter-spacing: 4px; text-transform: uppercase; font-weight: 500;
            color: rgba(255,255,255,0.85);
            display: flex; align-items: center; gap: 40px;
        }
        .marquee-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--gold-light); display: inline-block; }

        /* ─── SECTION HEADER ─── */
        .section-tag {
            font-size: 10px; letter-spacing: 5px; text-transform: uppercase; font-weight: 600;
            color: var(--gold);
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 16px;
        }
        .section-tag::before { content: ''; width: 28px; height: 1px; background: var(--gold); }

        .section-title {
            font-size: clamp(38px, 4vw, 58px);
            font-weight: 300; line-height: 1.1;
            color: var(--charcoal);
            margin-bottom: 20px;
        }
        .section-title em { font-style: italic; color: var(--crimson); }

        .section-desc {
            font-size: 15px; color: var(--muted); font-weight: 300; line-height: 1.8;
            max-width: 480px;
        }

        /* ─── ABOUT ─── */
        #about {
            padding: 120px 80px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        .about-img-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto;
            gap: 16px;
            position: relative;
        }

        .about-img-large {
            grid-column: 1; grid-row: 1 / 3;
            height: 520px;
            border-radius: 20px;
            object-fit: cover;
            width: 100%;
        }
        .about-img-sm {
            height: 248px;
            border-radius: 16px;
            object-fit: cover;
            width: 100%;
        }

        .about-gold-card {
            position: absolute; bottom: -24px; left: -24px;
            background: var(--gold);
            color: #fff;
            padding: 28px 32px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(198,150,58,0.35);
        }
        .about-gold-card .num { font-family: 'Cormorant Garamond', serif; font-size: 48px; font-weight: 700; line-height: 1; }
        .about-gold-card .lbl { font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; font-weight: 500; opacity: 0.85; margin-top: 6px; }

        .about-content { }
        .about-content .section-desc { max-width: 100%; margin-bottom: 32px; }

        .about-features { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 40px; }
        .feature-item {
            display: flex; align-items: flex-start; gap: 14px;
            padding: 20px; border-radius: 16px;
            background: var(--cream);
            border: 1px solid var(--border);
            transition: all 0.3s;
        }
        .feature-item:hover { border-color: var(--crimson); background: #fff; box-shadow: 0 8px 24px rgba(155,27,48,0.08); }
        .feature-icon {
            width: 40px; height: 40px; border-radius: 12px;
            background: var(--crimson);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 14px; flex-shrink: 0;
        }
        .feature-txt .ftit { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 600; color: var(--charcoal); }
        .feature-txt .fdsc { font-size: 12px; color: var(--muted); line-height: 1.6; margin-top: 2px; }

        /* ─── SERVICES ─── */
        #services {
            padding: 120px 80px;
            background: var(--charcoal);
            position: relative; overflow: hidden;
        }

        .services-bg {
            position: absolute; inset: 0; pointer-events: none;
            background: radial-gradient(ellipse at 70% 50%, rgba(155,27,48,0.15) 0%, transparent 60%);
        }

        .services-header {
            text-align: center; margin-bottom: 72px; position: relative; z-index: 2;
        }
        .services-header .section-tag { justify-content: center; }
        .services-header .section-tag::before { display: none; }
        .services-header .section-title { color: #fff; }
        .services-header .section-desc { color: rgba(255,255,255,0.5); margin: 0 auto; }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            position: relative; z-index: 2;
            max-width: 1200px; margin: 0 auto;
        }

        .service-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 44px 36px;
            text-align: center;
            transition: all 0.4s ease;
            position: relative; overflow: hidden;
            cursor: default;
        }
        .service-card::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(155,27,48,0.2) 0%, transparent 100%);
            opacity: 0; transition: opacity 0.4s;
        }
        .service-card:hover {
            border-color: rgba(155,27,48,0.4);
            transform: translateY(-6px);
            box-shadow: 0 24px 60px rgba(0,0,0,0.3);
        }
        .service-card:hover::before { opacity: 1; }

        .service-num {
            font-family: 'Cormorant Garamond', serif;
            font-size: 72px; font-weight: 300;
            color: rgba(255,255,255,0.05);
            line-height: 1;
            position: absolute; top: 16px; right: 24px;
        }

        .service-icon-wrap {
            width: 64px; height: 64px;
            border-radius: 18px;
            background: var(--crimson);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 28px;
            font-size: 22px; color: #fff;
            transition: transform 0.3s;
        }
        .service-card:hover .service-icon-wrap { transform: scale(1.1) rotate(-5deg); }

        .service-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px; font-weight: 600;
            color: #fff; margin-bottom: 14px;
        }
        .service-desc { font-size: 13px; color: rgba(255,255,255,0.45); line-height: 1.7; font-weight: 300; }

        .service-link {
            display: inline-flex; align-items: center; gap: 8px;
            margin-top: 28px;
            font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; font-weight: 600;
            color: var(--gold-light);
            text-decoration: none;
            transition: gap 0.3s;
        }
        .service-link:hover { gap: 14px; }

        /* ─── COLLECTION ─── */
        #collection {
            padding: 120px 80px;
            background: var(--cream);
        }

        .coll-header {
            display: flex; justify-content: space-between; align-items: flex-end;
            margin-bottom: 64px;
        }
        .coll-see-all {
            font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; font-weight: 600;
            color: var(--crimson); text-decoration: none;
            display: flex; align-items: center; gap: 8px;
            transition: gap 0.3s;
        }
        .coll-see-all:hover { gap: 14px; }

        .coll-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            grid-template-rows: 320px 280px;
            gap: 20px;
        }

        .coll-card {
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }
        .coll-card:first-child { grid-row: 1 / 3; }

        .coll-img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 0.7s ease;
        }
        .coll-card:hover .coll-img { transform: scale(1.07); }

        .coll-overlay {
